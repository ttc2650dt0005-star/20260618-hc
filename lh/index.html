<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行の高さ</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>行の高さ line-height</h1>
    <p class="lh-normal">
    この段落は line-height: normal; を指定しています。ブラウザの標準行間が適用されます。
    読みやすさはフォントや環境によって変わります。
  </p>

  <p class="lh-150">
    この段落は line-height: 1.8; を指定しています。1行の高さがフォントサイズの1.8倍になります。
    行間が広がることで、文章がゆったりとした印象になります。
  </p>

  <p class="lh-250">
    この段落は line-height: 2.5; を指定しています。行間が大きく広がり、タイトルや装飾的なレイアウトで使用されることがあります。
  </p>
    
</body>
</html>
